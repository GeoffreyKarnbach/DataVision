<div
  class="building-container border rounded p-3"
  style="margin-top: 2em; margin-bottom: 1em"
>
  <h3 class="section-title">Building: {{ building.name }}</h3>

  <div class="mb-3">
    <input
      class="form-control mb-2"
      [(ngModel)]="newFloorName"
      placeholder="New Floor Name"
    />
    <button
      class="btn btn-primary btn-sm"
      (click)="addFloor()"
      style="margin-left: 0.5em"
    >
      <span class="img icon">
        <i class="bi-plus-circle"></i>
      </span>
      Floor
    </button>
  </div>

  <div
    class="floor border rounded p-3 mb-3"
    *ngFor="let floor of building.floors; let fIdx = index"
  >
    <div class="d-flex justify-content-between align-items-center">
      <div *ngIf="!editingFloors.has(fIdx)">
        <h4 class="section-title">Floor: {{ floor.name }}</h4>
        <button
          class="btn btn-sm btn-outline-primary me-2"
          (click)="startEditFloor(fIdx, floor.name)"
        >
          <span class="img icon">
            <i class="bi-pencil"></i>
          </span>
        </button>
        <button
          class="btn btn-sm btn-outline-danger"
          (click)="deleteFloor(fIdx)"
        >
          <span class="img icon">
            <i class="bi-trash"></i>
          </span>
        </button>
      </div>
      <div *ngIf="editingFloors.has(fIdx)">
        <input class="form-control me-2" [(ngModel)]="floorEditNames[fIdx]" />
        <button
          class="btn btn-sm btn-success me-1"
          (click)="saveFloorEdit(fIdx)"
        >
          <span class="img icon">
            <i class="bi-check-circle"></i>
          </span>
        </button>
        <button class="btn btn-sm btn-danger" (click)="cancelFloorEdit(fIdx)">
          <span class="img icon">
            <i class="bi-x-lg"></i>
          </span>
        </button>
      </div>
    </div>

    <div class="mb-2 mt-3">
      <input
        class="form-control mb-2"
        [(ngModel)]="newRoomNameMap[fIdx]"
        placeholder="New Room Name"
      />
      <button
        class="btn btn-secondary btn-sm"
        (click)="addRoom(fIdx)"
        style="margin-left: 0.5em"
      >
        <span class="img icon">
          <i class="bi-plus-circle"></i>
        </span>
        Room
      </button>
    </div>

    <div
      class="room border rounded p-3 mb-3"
      *ngFor="let room of floor.rooms; let rIdx = index"
    >
      <div class="d-flex justify-content-between align-items-center">
        <div *ngIf="!editingRooms.has(fIdx + '_' + rIdx)">
          <h5 class="section-title">Room: {{ room.name }}</h5>
          <button
            class="btn btn-sm btn-outline-primary me-2"
            (click)="startEditRoom(fIdx, rIdx, room.name)"
          >
            <span class="img icon">
              <i class="bi-pencil"></i>
            </span>
          </button>
          <button
            class="btn btn-sm btn-outline-danger"
            (click)="deleteRoom(fIdx, rIdx)"
          >
            <span class="img icon">
              <i class="bi-trash"></i>
            </span>
          </button>
        </div>
        <div *ngIf="editingRooms.has(fIdx + '_' + rIdx)">
          <input
            class="form-control me-2"
            [(ngModel)]="roomEditNames[fIdx + '_' + rIdx]"
          />
          <button
            class="btn btn-sm btn-success me-1"
            (click)="saveRoomEdit(fIdx, rIdx)"
          >
            <span class="img icon">
              <i class="bi-check-circle"></i>
            </span>
          </button>
          <button
            class="btn btn-sm btn-danger"
            (click)="cancelRoomEdit(fIdx, rIdx)"
          >
            <span class="img icon">
              <i class="bi-x-lg"></i>
            </span>
          </button>
        </div>
      </div>

      <div class="mb-2 mt-2">
        <select
          class="form-select mb-2"
          [(ngModel)]="selectedThingMap[fIdx + '_' + rIdx]"
        >
          <option value="">Select Thing</option>
          <option
            *ngFor="let thing of getAvailableThings()"
            [value]="thing.tdLink"
          >
            {{ thing.topicName }}
          </option>
        </select>
        <button
          class="btn btn-outline-success btn-sm"
          (click)="addThingToRoom(fIdx, rIdx)"
          [disabled]="!selectedThingMap[fIdx + '_' + rIdx]"
        >
          <span class="img icon">
            <i class="bi-plus-circle"></i>
          </span>
          Thing
        </button>
      </div>

      <ul class="list-group">
        <li
          class="list-group-item d-flex justify-content-between align-items-center"
          *ngFor="let thing of room.things; let tIdx = index"
        >
          {{ thing.topicName }}
          <button
            class="btn btn-sm btn-outline-danger"
            (click)="removeThing(fIdx, rIdx, tIdx)"
          >
            <span class="img icon">
              <i class="bi-trash"></i>
            </span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>

<button class="btn btn-primary d-block mx-auto" (click)="saveMapping()">
  <span class="img icon">
    <i class="bi-save"></i>
  </span>
  Save Mapping
</button>
